<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="menu.html">
            Alke Wallet

        <div>

            <a href="menu.html" class="btn btn-outline-light">
                Volver
            </a>

        </div>

    </div>

</nav>

<!-- CONTENIDO -->

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">
            Enviar Dinero
        </h2>

        <h4 class="mb-4">
            Saldo disponible:
            <span class="text-success" id="saldoTransferencia">
                $100000
            </span>
        </h4>

        <!-- CONTACTO -->

        <div class="mb-3">

            <label class="form-label">
                Buscar Contacto
            </label>

            <input 
                type="text"
                class="form-control"
                id="contacto"
                list="listaContactos"
                placeholder="Ingrese nombre del contacto">

            <datalist id="listaContactos">

                <option value="Juan">
                <option value="Camila">
                <option value="Pedro">
                <option value="Fernanda">
                <option value="María">

            </datalist>

        </div>

        <!-- MONTO -->

        <div class="mb-3">

            <label class="form-label">
                Monto a transferir
            </label>

            <input 
                type="number"
                class="form-control"
                id="montoTransferencia"
                placeholder="Ingrese monto">

        </div>

        <!-- BOTÓN -->

        <button class="btn btn-dark" id="enviarDinero">
            Transferir
        </button>

        <!-- MENSAJE -->

        <p class="mt-4 fw-bold" id="mensajeTransferencia"></p>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
